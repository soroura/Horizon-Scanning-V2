  # ─── openFDA ────────────────────────────────────────────────────────────────
  - id: openfda_devices
    name: "openFDA Device Clearances"
    category: regulatory
    url: "https://api.fda.gov/"
    feed_type: api
    feed_url: "https://api.fda.gov/device/510k.json"
    access: free
    auth_required: false
    update_frequency: daily
    domains: [fda_regulatory]
    horizon_tier: H1
    programmatic_access: full
    priority_rank: null
    notes: "510(k) device clearances — all devices"
    active: true
    skip_domain_filter: true

  - id: openfda_drugs
    name: "openFDA Drug Approvals"
    category: regulatory
